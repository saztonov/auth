# Вклад auth-контура в общий ingress infra-nginx. Копируется в /opt/infra/nginx/conf.d/keycloak.conf,
# затем nginx -t && nginx -s reload. Обновляется отдельно от порталов (deploy-estimat его не трогает).
#
# ВНИМАНИЕ: на VPS этот файл ЗАМЕНЯЕТ существующий keycloak.conf — перед reload сделать backup
# live-конфига, смержить allowlist/cert-пути с боевым, выполнить `nginx -t`. Merge — вручную при деплое.
#
# Сертификат (один SAN на auth.su10.ru + auth-admin.su10.ru) выпускается webroot ДО добавления
# 443-блоков:
#   certbot certonly --webroot -w /var/www/certbot -d auth.su10.ru -d auth-admin.su10.ru
#
# Upstream — контейнер keycloak:8080 в сети edge (наружу не публикуется).
# Витрина (SPA) — статик из /opt/infra/launcher/dist, отдаётся на auth.su10.ru/.
#
# admin-домен: доступ ОСОЗНАННО открыт со всех IP (решение 2026-07-05) — allowlist планируется
# заменить на SSH-туннели, а не на IP-фильтр в nginx. НЕ включать `allow <CIDR>; deny all;`
# здесь до перехода на туннели — это временное открытое состояние, а не забытый TODO.

# --- HTTP: ACME + редирект на HTTPS ---
server {
    listen 80;
    server_name auth.su10.ru auth-admin.su10.ru;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS: ПУБЛИЧНЫЙ домен auth.su10.ru ---
# /  → SPA-витрина;  /realms/,/resources/,/js/  → Keycloak (вход, Account Console, OIDC, JWKS).
server {
    listen 443 ssl;
    http2 on;
    server_name auth.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/auth.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.su10.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Keycloak (зарезервированные префиксы) ---
    location ~ ^/(realms|resources|js)/ {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    # --- SPA-витрина порталов (SPA-fallback на index.html) ---
    root /opt/infra/launcher/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- HTTPS: АДМИН-домен auth-admin.su10.ru (пока открыт всем; см. примечание выше) ---
server {
    listen 443 ssl;
    http2 on;
    server_name auth-admin.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/auth.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.su10.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Доступ к админке — пока открыт для всех (осознанно, см. комментарий выше). Планируется
    # закрыть через SSH-туннели, не через allow/deny здесь.
    # TEMP: admin open to all — lock down after SSH-tunnel access is set up

    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
