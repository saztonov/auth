# Тема входа su10 — наследует стандартную тему Keycloak и добавляет брендинг.
parent=keycloak
import=common/keycloak

# Стили Keycloak наследуются от родителя (merge по цепочке parent); поверх — наш css.
# Путь относительно login/resources/ → css/login.css = login/resources/css/login.css.
styles=css/login.css

# Локали (штатные переводы KC + наш messages/messages_ru.properties поверх).
locales=ru,en
