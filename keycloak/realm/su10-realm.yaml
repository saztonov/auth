# realm-as-code для контура su10 (формат keycloak-config-cli).
# Накат: docker compose -p keycloak --profile config run --rm config-cli
# Идемпотентно приводит realm su10 к описанному состоянию. Пользователи и AD-федерация здесь НЕ
# описываются (управляются отдельно; config-cli настроен на no-delete для несписанных сущностей).
#
# Секреты клиентов НЕ хранить в открытом виде — подставляются из переменных окружения config-cli
# (см. секреты клиентов ниже: ESTIMAT_CLIENT_SECRET, BILLHUB_CLIENT_SECRET).
#
# ВАЖНО: IMPORT_VARSUBSTITUTION_ENABLED делает сырую текстовую подстановку по всему файлу,
# включая комментарии (обрабатывается до разбора YAML) — падает, если переменная не задана в .env.
# Поэтому placeholder-синтаксис подстановки (доллар, круглая скобка, env, двоеточие, имя, скобка)
# нельзя использовать в комментариях как иллюстрацию — только там, где переменная реально
# экспортирована в окружение сервиса config-cli.

realm: su10
enabled: true

# Кастомная тема su10 (login + account) по умолчанию для realm; per-client можно переопределить.
loginTheme: su10
accountTheme: su10

# Мягкая политика по умолчанию: native-хэш argon2 (не задаём hashAlgorithm — берётся дефолт 26/non-FIPS).
passwordPolicy: "length(8)"

# Логин по email как username (порталы логинят по email).
# Регистрация — Вариант B: realm ЗАКРЫТ, регистрацию подрядчиков ведут порталы через Admin API
# (create user + группа <портал>-pending). Открытой self-registration в корпоративном realm нет.
registrationAllowed: false
loginWithEmailAllowed: true
duplicateEmailsAllowed: false
# SMTP пока не настроен — почтовые функции выключены (включить позже вместе со smtpServer).
resetPasswordAllowed: false
verifyEmail: false

# Интернационализация: контур только русскоязычный. Единственная supportedLocale — Keycloak
# рисует переключатель языка на странице входа только когда локалей больше одной; en убран,
# чтобы переключателя не было вообще (не нужен, англоязычной версии не планируется).
internationalizationEnabled: true
defaultLocale: ru
supportedLocales:
  - ru

# --- SMTP (хук на будущее; при появлении релея заполнить и включить verifyEmail/resetPasswordAllowed) ---
# smtpServer:
#   host: <smtp-host>
#   port: "587"
#   from: no-reply@su10.ru
#   fromDisplayName: su10
#   ssl: "false"
#   starttls: "true"
#   auth: "true"
#   user: <smtp-user>
#   password: <задать через переменную окружения config-cli при включении SMTP>

# --- Declarative User Profile (KC 26) ---
# ВНИМАНИЕ: keycloak-config-cli 6.x секцию `userProfile` в realm-import НЕ применяет (adorsys #979 —
# оставляет профиль дефолтным; проверено на тест-realm up-poc). Поэтому профиль тут НЕ описываем, а
# применяем ОТДЕЛЬНО прямым Admin API PUT /users/profile:
#     конфиг  → keycloak/realm/su10-userprofile.json
#     накат   → keycloak/realm/apply-userprofile.sh   (ПОСЛЕ config-cli; см. deploy-auth.sh)
# Профиль нужен, чтобы: (1) сохранять управляемый атрибут `billhub_user_id` (иначе KC 26 отбрасывает
# неописанные атрибуты, и маппер billhub_user_id ниже пробросит пустоту); (2) держать firstName/lastName
# обязательными для роли user (VERIFY_PROFILE). Доказано скриптом verify-userprofile-poc.sh (2026-07-05).

clients:
  # ---------------------------------------------------------------- EstiMat (сметный портал)
  - clientId: estimat
    enabled: true
    protocol: openid-connect
    publicClient: false
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    secret: $(env:ESTIMAT_CLIENT_SECRET)
    # loginTheme: estimat   # включить, когда тема estimat задеплоена (иначе KC откатится на дефолт su10)
    redirectUris:
      - https://estimat.su10.ru/api/auth/oidc/callback
    webOrigins:
      - https://estimat.su10.ru
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: https://estimat.su10.ru/
    protocolMappers:
      - name: audience-estimat
        protocol: openid-connect
        protocolMapper: oidc-audience-mapper
        config:
          included.client.audience: estimat
          access.token.claim: "true"
          id.token.claim: "false"
      - name: email
        protocol: openid-connect
        protocolMapper: oidc-usermodel-property-mapper
        config:
          user.attribute: email
          claim.name: email
          jsonType.label: String
          access.token.claim: "true"
          id.token.claim: "true"
      - name: username
        protocol: openid-connect
        protocolMapper: oidc-usermodel-property-mapper
        config:
          user.attribute: username
          claim.name: preferred_username
          jsonType.label: String
          access.token.claim: "true"
          id.token.claim: "true"
      - name: client-roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          usermodel.clientRoleMapping.clientId: estimat
          claim.name: resource_access.estimat.roles
          jsonType.label: String
          multivalued: "true"
          access.token.claim: "true"

  # ---------------------------------------------------------------- BillHub
  - clientId: billhub
    enabled: true
    protocol: openid-connect
    publicClient: false
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    # Сервис-аккаунт для Admin API портала: регистрация подрядчиков (create user + пароль) и
    # активация (перевод billhub-pending → billhub-active). Роли назначены ниже в users:.
    serviceAccountsEnabled: true
    secret: $(env:BILLHUB_CLIENT_SECRET)
    loginTheme: billhub
    redirectUris:
      - https://rp.su10.ru/api/auth/oidc/callback
      - https://ravek.link/api/auth/oidc/callback
      - https://www.ravek.link/api/auth/oidc/callback
    webOrigins:
      - https://rp.su10.ru
      - https://ravek.link
      - https://www.ravek.link
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: https://rp.su10.ru/##https://ravek.link/##https://www.ravek.link/
    protocolMappers:
      - name: audience-billhub
        protocol: openid-connect
        protocolMapper: oidc-audience-mapper
        config:
          included.client.audience: billhub
          access.token.claim: "true"
          id.token.claim: "false"
      - name: email
        protocol: openid-connect
        protocolMapper: oidc-usermodel-property-mapper
        config:
          user.attribute: email
          claim.name: email
          jsonType.label: String
          access.token.claim: "true"
          id.token.claim: "true"
      - name: username
        protocol: openid-connect
        protocolMapper: oidc-usermodel-property-mapper
        config:
          user.attribute: username
          claim.name: preferred_username
          jsonType.label: String
          access.token.claim: "true"
          id.token.claim: "true"
      # Членство в группах → claim `groups` (гейт доступа BillHub: billhub-active). Имя группы,
      # без полного пути (бэкенд принимает и имя, и `/<name>`).
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          claim.name: groups
          full.path: "false"
          access.token.claim: "true"
          id.token.claim: "false"
          userinfo.token.claim: "true"
      # Внутренний id пользователя BillHub (users.id) как стабильный correlation-key: BillHub при
      # импорте/провижининге кладёт его в атрибут `billhub_user_id`, маппер пробрасывает в токен
      # (access+id+userinfo). Бэкенд резолвит юзера по этому claim из verified JWT — устойчиво к смене
      # `sub` при переезде local→AD. Требует разрешённого атрибута в user-profile realm — он ставится
      # НЕ здесь, а прямым PUT (su10-userprofile.json + apply-userprofile.sh); config-cli его не применяет.
      - name: billhub_user_id
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        config:
          user.attribute: billhub_user_id
          claim.name: billhub_user_id
          jsonType.label: String
          access.token.claim: "true"
          id.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "false"

  # ---------------------------------------------------------------- BillHub import (ops, manage-realm)
  # МАШИННЫЙ клиент ТОЛЬКО для массового импорта: `partialImport` требует роль manage-realm, которой нет
  # у сервис-аккаунта billhub (у него только view/manage-users). client_credentials, без Standard flow.
  # ⚠️ Мощные права → держим enabled:false; ВКЛЮЧИТЬ только на окно миграции (admin console Enabled=On,
  #    либо enabled:true + config-cli), после импорта — выключить/удалить. Роли SA — в users: ниже.
  #    Секрет $(env:BILLHUB_IMPORT_CLIENT_SECRET) должен быть в .env, иначе config-cli падает на подстановке.
  - clientId: billhub-import
    enabled: false
    protocol: openid-connect
    publicClient: false
    standardFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    secret: $(env:BILLHUB_IMPORT_CLIENT_SECRET)

  # ---------------------------------------------------------------- Витрина порталов (SPA)
  - clientId: su10-launcher
    enabled: true
    protocol: openid-connect
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    redirectUris:
      - https://auth.su10.ru/*
    webOrigins:
      - https://auth.su10.ru
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: https://auth.su10.ru/
    protocolMappers:
      # Витрина фильтрует плитки порталов (launcher/src/config/portals.ts::hasPortalAccess) — ей нужны
      # claim'ы resource_access.estimat.roles (EstiMat, гейт по client-роли) и groups (BillHub, гейт по
      # группе billhub-active). ⚠️ id.token.claim ОБЯЗАТЕЛЕН: у SPA нет loadUserInfo, react-oidc-context
      # берёт user.profile ИСКЛЮЧИТЕЛЬНО из id_token — в отличие от мапперов estimat/billhub (те кладут
      # только в access_token, т.к. их читают BFF-бэкенды порталов на своей стороне, не браузер).
      - name: resource-access-estimat
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          usermodel.clientRoleMapping.clientId: estimat
          claim.name: resource_access.estimat.roles
          jsonType.label: String
          multivalued: "true"
          id.token.claim: "true"
          access.token.claim: "true"
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          claim.name: groups
          full.path: "false"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"

# Клиентские роли (авторизацию порталы решают у себя; здесь — гейт доступа и справочные роли).
roles:
  client:
    estimat:
      - name: access
        description: Доступ к порталу EstiMat
      - name: admin
      - name: engineer
      - name: manager
      - name: contractor
    billhub:
      - name: access
        description: Доступ к порталу BillHub

# Группы-гейты доступа к порталам (Вариант B). Подрядчик после регистрации попадает в
# <портал>-pending (доступа нет); активация (админ Keycloak или админ портала через Admin API)
# переводит в <портал>-active. Членство пробрасывается в токен маппером `groups` клиента.
# Для EstiMat группы появятся при его миграции на групповой гейт (сейчас EstiMat гейтит ролью access).
#
# Отдельно (не про доступ к порталу, а про ТИП персоны — видно прямо в консоли Keycloak): свой сотрудник
# vs внешний подрядчик. Realm-уровень (не привязано к порталу) — это факт про человека, нужен и для
# будущей AD-миграции (подрядчики остаются на keycloak-local навсегда, сотрудники едут на keycloak-ad).
# Простановка при импорте/провижининге — на стороне портала (знает роль/counterparty_id из своей БД).
# ⚠️ У GroupRepresentation в Keycloak НЕТ поля description (в отличие от ролей) — config-cli падает
# на парсинге, если его добавить. Значение поясняем только комментарием.
groups:
  - name: billhub-pending
  - name: billhub-active
  - name: employee   # штатный сотрудник компании (не подрядчик)
  - name: contractor # внешний подрядчик/контрагент

# Сервис-аккаунт клиента billhub для Admin REST (регистрация/активация подрядчиков).
# Роли realm-management: view-users (чтение), manage-users (create user, пароль, членство в группах).
# config-cli управляет только этим service-account-пользователем; прочие пользователи (AD и т.п.)
# не описываются и не удаляются (import.managed.user=no-delete).
users:
  - username: service-account-billhub
    enabled: true
    serviceAccountClientId: billhub
    clientRoles:
      realm-management:
        - view-users
        - manage-users
  # Сервис-аккаунт импорт-клиента: manage-realm (partialImport) + manage-users/view-users (создание/чтение/
  # атрибуты юзеров при импорте). Мощные права — только на окно миграции (клиент billhub-import enabled:false).
  - username: service-account-billhub-import
    enabled: true
    serviceAccountClientId: billhub-import
    clientRoles:
      realm-management:
        - manage-realm
        - manage-users
        - view-users
